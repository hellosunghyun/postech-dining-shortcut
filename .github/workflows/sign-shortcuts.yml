name: Build Shortcuts

on:
  push:
    paths:
      - "shortcuts/src/**"
      - "scripts/build-shortcuts.sh"
      - ".github/workflows/sign-shortcuts.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cherri
        run: |
          brew tap electrikmilk/cherri
          brew install electrikmilk/cherri/cherri
      - name: Build signed shortcut files
        run: |
          bash scripts/build-shortcuts.sh signed shortcuts/build
          ditto -c -k shortcuts/build shortcuts/postech-dining-shortcuts.zip
      - uses: actions/upload-artifact@v4
        with:
          name: postech-dining-shortcuts
          path: shortcuts/build/*.shortcut
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Shortcuts
          body: |
            자동 생성된 POSTECH dining 단축어입니다.

            포함 파일:
            - POSTECH 오늘 조식.shortcut
            - POSTECH 오늘 점심.shortcut
            - POSTECH 오늘 저녁.shortcut
            - POSTECH 오늘 전체 식사.shortcut
          files: shortcuts/postech-dining-shortcuts.zip
          make_latest: true
