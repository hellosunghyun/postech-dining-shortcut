name: Build Shortcuts

on:
  push:
    paths:
      - "shortcuts/src/**"
      - "scripts/build-shortcuts.sh"
      - ".github/workflows/sign-shortcuts.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: shortcut-build
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cherri
        run: |
          brew tap electrikmilk/cherri
          brew install electrikmilk/cherri/cherri
      - name: Build signed shortcut files
        run: |
          bash scripts/build-shortcuts.sh signed shortcuts/build
      - name: Copy shortcut files for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p docs/downloads
          cp shortcuts/build/*.shortcut docs/downloads/
      - name: Commit Pages shortcut files
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Pages shortcut downloads"
          file_pattern: docs/downloads/*.shortcut
      - uses: actions/upload-artifact@v4
        with:
          name: postech-dining-shortcuts
          path: shortcuts/build/*.shortcut
      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main'
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: docs
      - id: deployment
        if: github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
      - name: Reset latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag -y || true
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Shortcuts
          body: |
            자동 생성된 POSTECH dining 단축어입니다.

            포함 파일:
            - postech-breakfast.shortcut
            - postech-lunch.shortcut
            - postech-dinner.shortcut
            - postech-all.shortcut
          files: shortcuts/build/*.shortcut
          make_latest: true
