name: Cache Menu

on:
  schedule:
    - cron: "5 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache today's menu
        run: npm run cache
      - name: Commit cached menu
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Cache POSTECH menu"
          file_pattern: docs/api/*.json
