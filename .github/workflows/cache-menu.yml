name: Cache Menu

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cache-menu
  cancel-in-progress: false

jobs:
  cache:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache today's menu
        run: npm run cache
      - name: Commit cached menu
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Cache POSTECH menu"
          file_pattern: docs/api/*.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
